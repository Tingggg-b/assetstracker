<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Tracker ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #fcf8ff;
            --card-bg: #ffffff;
            --pastel-purple: #d8b4fe;
            --accent-purple: #9333ea;
            --text-main: #4b2c5e;
            --muted-text: #b1a0c7;
            --pink: #f472b6;
            --mint: #bbf7d0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px 20px 100px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 450px; }
        .page { display: none; width: 100%; }
        .active-page { display: block; }

        .top-controls {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 15px;
            gap: 10px;
        }

        .header-card {
            background: var(--pastel-purple);
            color: white;
            padding: 25px 20px;
            border-radius: 25px;
            text-align: center;
            margin-bottom: 25px;
            box-shadow: 0 8px 20px rgba(216, 180, 254, 0.4);
        }

        .total-amt { font-size: 2.3rem; font-weight: bold; margin: 10px 0; }
        
        .mask-text { 
            font-family: 'Cherry Bomb One', cursive; 
            letter-spacing: 3px; 
            opacity: 0.9; 
            font-weight: normal;
        }

        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 18px 0;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
            z-index: 1000;
        }

        .nav-item { border: none; background: none; color: var(--muted-text); font-weight: bold; cursor: pointer; font-size: 0.9rem; text-transform: uppercase; font-family: inherit; }
        .nav-item.active { color: var(--accent-purple); }

        .card { background: var(--card-bg); border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 2px solid #f3e8ff; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f9f5ff; }
        .label { font-weight: 600; font-size: 0.9rem; }
        .date-display { font-size: 0.7rem; color: var(--muted-text); }
        
        input { border: 2px solid #f3e8ff; border-radius: 10px; padding: 8px; width: 90px; text-align: right; outline: none; font-family: inherit; }
        .display-val { font-weight: bold; color: var(--accent-purple); }

        .toggle-btn { background: #f3e8ff; border: none; border-radius: 50%; width: 22px; height: 22px; color: var(--accent-purple); cursor: pointer; }
        
        .action-btn { 
            flex: 1; padding: 12px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; font-family: inherit; font-size: 0.8rem;
        }
        .btn-hide { background: white; color: var(--accent-purple); border: 2px solid var(--pastel-purple); }
        .btn-edit { background: var(--accent-purple); color: white; }
        .btn-save { background: #10b981; color: white; }
        .btn-snap { background: var(--pink); color: white; width: 100%; border-radius: 20px; padding: 15px; margin-bottom: 20px; font-family: inherit; }

        #chart-container { width: 100%; height: 320px; margin-bottom: 20px; }

        .sub-section { margin-left: 15px; padding-left: 10px; border-left: 2px dashed var(--pastel-purple); display: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="page-tracker" class="page active-page">
        <div class="top-controls">
            <button class="action-btn btn-hide" onclick="togglePrivacy()" id="privacyBtn">Hide Amounts</button>
            <button id="editBtn" class="action-btn btn-edit" onclick="toggleEdit(true)">Edit Details</button>
            <button id="saveBtn" class="action-btn btn-save hidden" onclick="toggleEdit(false)">Save & Close</button>
        </div>
        
        <div class="header-card">
            <div style="font-size: 0.9rem;">Total Assets (excl. MPF)</div>
            <div class="total-amt" id="top-total">$0</div>
            <div style="font-size: 0.8rem; opacity: 0.9;">Net Worth: <span id="true-net-worth">$0</span></div>
        </div>

        <div class="card">
            <div class="row"><span class="label">HSBC Bank</span><input type="number" id="hsbc" class="edit-mode hidden"><span class="display-val view-mode" id="v_hsbc"></span></div>
            <div class="row">
                <span class="label"><button class="toggle-btn" onclick="toggleSub('mox-subs')">▶</button> Mox Bank</span>
                <span class="display-val" id="v_mox_total"></span>
            </div>
            <div id="mox-subs" class="sub-section">
                <div class="row"><span>Deposit</span><input type="number" id="mox_dep" class="edit-mode hidden"><span id="v_mox_dep" class="view-mode"></span></div>
                <div class="row"><span>Time Deposit</span><input type="number" id="mox_time" class="edit-mode hidden"><span id="v_mox_time" class="view-mode"></span></div>
            </div>
            <div class="row"><span class="label">Futu</span><input type="number" id="futu" class="edit-mode hidden"><span class="display-val view-mode" id="v_futu"></span></div>
            <div class="row"><span class="label">MFC Stocks (USD)</span><div><input type="number" id="mfc_usd" class="edit-mode hidden"><span class="display-val view-mode" id="v_mfc"></span></div></div>
            <div class="row"><span class="label">Cash</span><input type="number" id="cash" class="edit-mode hidden"><span class="display-val view-mode" id="v_cash"></span></div>
            <div class="row"><span class="label">Receivables</span><input type="number" id="recv" class="edit-mode hidden"><span class="display-val view-mode" id="v_recv"></span></div>
            <div class="row"><span class="label">MPF</span><input type="number" id="mpf" class="edit-mode hidden"><span class="display-val view-mode" id="v_mpf"></span></div>
        </div>

        <div style="font-size: 0.75rem; font-weight: bold; margin: 10px; color: var(--accent-purple); letter-spacing: 1px;">LIABILITIES</div>
        <div class="card">
            <div class="row">
                <div><span class="label">Everymile</span> <span id="v_date_em" class="date-display"></span><input type="date" id="date_em" class="edit-mode hidden"></div>
                <input type="number" id="h_em" class="edit-mode hidden"><span class="display-val view-mode" id="v_h_em" style="color:var(--pink)"></span>
            </div>
            <div class="row">
                <div><span class="label">HSBC Gold</span> <span id="v_date_gold" class="date-display"></span><input type="date" id="date_gold" class="edit-mode hidden"></div>
                <input type="number" id="h_gold" class="edit-mode hidden"><span class="display-val view-mode" id="v_h_gold" style="color:var(--pink)"></span>
            </div>
            <div class="row">
                <div><span class="label">SCB MC</span> <span id="v_date_scb" class="date-display"></span><input type="date" id="date_scb" class="edit-mode hidden"></div>
                <input type="number" id="s_mc" class="edit-mode hidden"><span class="display-val view-mode" id="v_s_mc" style="color:var(--pink)"></span>
            </div>
            <div class="row">
                <div><span class="label">Citi MC</span> <span id="v_date_citi" class="date-display"></span><input type="date" id="date_citi" class="edit-mode hidden"></div>
                <input type="number" id="c_mc" class="edit-mode hidden"><span class="display-val view-mode" id="v_c_mc" style="color:var(--pink)"></span>
            </div>
            <div class="row"><span class="label">Other</span><input type="number" id="other" class="edit-mode hidden"><span class="display-val view-mode" id="v_other" style="color:var(--pink)"></span></div>
        </div>
    </div>

    <div id="page-history" class="page">
        <div class="header-card" style="background: var(--pink);">
            <div style="font-size: 1.1rem; font-weight: bold;">History & Analytics</div>
        </div>
        
        <div class="card" id="chart-container">
            <canvas id="assetChart"></canvas>
        </div>

        <button class="action-btn btn-snap" onclick="takeSnapshot()">Save Monthly Snapshot</button>
        <div id="snapshot-list"></div>
    </div>

</div>

<div class="nav-bar">
    <button class="nav-item active" id="nav-tracker" onclick="showPage('tracker')">Dashboard</button>
    <button class="nav-item" id="nav-history" onclick="showPage('history')">History</button>
</div>

<script>
    let isHidden = false;
    let usdRate = 7.82;
    let historyData = JSON.parse(localStorage.getItem('assetHistory_v9') || '[]');
    let myChart = null;

    async function fetchRate() {
        try {
            const res = await fetch('https://open.er-api.com/v6/latest/USD');
            const data = await res.json();
            usdRate = data.rates.HKD;
        } catch(e) {}
        calculate();
    }

    function showPage(p) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active-page'));
        document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
        document.getElementById('page-' + p).classList.add('active-page');
        document.getElementById('nav-' + p).classList.add('active');
        if(p === 'history') {
            renderHistory();
            updateChart();
        }
    }

    function togglePrivacy() {
        isHidden = !isHidden;
        document.getElementById('privacyBtn').innerText = isHidden ? "Show Amounts" : "Hide Amounts";
        calculate();
    }

    function toggleSub(id) {
        const el = document.getElementById(id);
        el.style.display = (el.style.display === "block") ? "none" : "block";
    }

    function toggleEdit(isEditing) {
        document.querySelectorAll('.edit-mode').forEach(el => el.classList.toggle('hidden', !isEditing));
        document.querySelectorAll('.view-mode').forEach(el => el.classList.toggle('hidden', isEditing));
        document.getElementById('editBtn').classList.toggle('hidden', isEditing);
        document.getElementById('saveBtn').classList.toggle('hidden', !isEditing);
        if(!isEditing) { saveData(); calculate(); }
    }

    function saveData() {
        const data = {};
        document.querySelectorAll('input').forEach(i => data[i.id] = i.value);
        localStorage.setItem('assetData_v9', JSON.stringify(data));
    }

    function calculate() {
        const getV = (id) => parseFloat(document.getElementById(id).value) || 0;
        const fmt = (v) => isHidden ? `<span class="mask-text">****</span>` : '$' + Math.round(v).toLocaleString();

        const mox = getV('mox_dep') + getV('mox_time');
        const mfc = getV('mfc_usd') * usdRate;
        const totalExMPF = (getV('hsbc') + mox + getV('futu') + mfc + getV('cash') + getV('recv')) - (getV('h_em') + getV('h_gold') + getV('s_mc') + getV('c_mc') + getV('other'));
        const netWorth = totalExMPF + getV('mpf');

        document.getElementById('top-total').innerHTML = fmt(totalExMPF);
        document.getElementById('true-net-worth').innerHTML = fmt(netWorth);

        const fields = {v_hsbc:'hsbc', v_mox_total:mox, v_mox_dep:'mox_dep', v_mox_time:'mox_time', v_futu:'futu', v_mfc:mfc, v_cash:'cash', v_recv:'recv', v_mpf:'mpf', v_h_em:'h_em', v_h_gold:'h_gold', v_s_mc:'s_mc', v_c_mc:'c_mc', v_other:'other'};
        for (let [vid, val] of Object.entries(fields)) {
            const el = document.getElementById(vid);
            if (el) el.innerHTML = typeof val === 'string' ? fmt(getV(val)) : fmt(val);
        }

        ['em', 'gold', 'scb', 'citi'].forEach(id => {
            const dateVal = document.getElementById('date_'+id).value;
            document.getElementById('v_date_'+id).innerText = dateVal ? `(${dateVal})` : '';
        });
    }

    function takeSnapshot() {
        const getV = (id) => parseFloat(document.getElementById(id).value) || 0;
        const mox = getV('mox_dep') + getV('mox_time');
        const mfc = getV('mfc_usd') * usdRate;
        const snap = {
            date: new Date().toLocaleDateString('en-GB', { month: 'short', year: 'numeric' }),
            cash: getV('hsbc') + mox + getV('cash') + getV('recv'),
            stocks: getV('futu') + mfc,
            mpf: getV('mpf'),
            liab: getV('h_em') + getV('h_gold') + getV('s_mc') + getV('c_mc') + getV('other')
        };
        historyData.push(snap); 
        localStorage.setItem('assetHistory_v9', JSON.stringify(historyData));
        renderHistory();
        updateChart();
    }

    function renderHistory() {
        const container = document.getElementById('snapshot-list');
        const reversedData = [...historyData].reverse();
        container.innerHTML = reversedData.map((s, index) => `
            <div class="card" style="font-size:0.85rem">
                <div style="display:flex; justify-content:space-between; font-weight:bold; color:var(--pink)">
                    <span>${s.date}</span>
                    <span>$${Math.round(s.cash + s.stocks + s.mpf - s.liab).toLocaleString()}</span>
                </div>
                <div style="margin-top:8px; opacity:0.8">
                    Cash: $${Math.round(s.cash).toLocaleString()} | Stocks: $${Math.round(s.stocks).toLocaleString()}<br>
                    MPF: $${Math.round(s.mpf).toLocaleString()} | Liab: -$${Math.round(s.liab).toLocaleString()}
                </div>
                <button onclick="deleteSnap(${historyData.length - 1 - index})" style="background:none; border:none; color:var(--muted-text); font-size:0.7rem; margin-top:10px; cursor:pointer;">Remove</button>
            </div>
        `).join('');
    }

    function deleteSnap(i) {
        if(confirm("Delete this snapshot?")) {
            historyData.splice(i, 1);
            localStorage.setItem('assetHistory_v9', JSON.stringify(historyData));
            renderHistory();
            updateChart();
        }
    }

    function updateChart() {
        const ctx = document.getElementById('assetChart').getContext('2d');
        const labels = historyData.map(s => s.date);
        
        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Cash Group',
                        data: historyData.map(s => Math.round(s.cash)),
                        backgroundColor: '#d8b4fe', // Pastel Purple
                        borderRadius: 4
                    },
                    {
                        label: 'Stocks',
                        data: historyData.map(s => Math.round(s.stocks)),
                        backgroundColor: '#f472b6', // Pastel Pink
                        borderRadius: 4
                    },
                    {
                        label: 'MPF',
                        data: historyData.map(s => Math.round(s.mpf)),
                        backgroundColor: '#bbf7d0', // Pastel Mint
                        borderRadius: 4
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { 
                    legend: { display: true, position: 'top', labels: { boxWidth: 12, font: { size: 10 } } } 
                },
                scales: {
                    x: { stacked: true, grid: { display: false } },
                    y: { 
                        stacked: true, 
                        grid: { color: '#f3e8ff' },
                        ticks: {
                            stepSize: 200000,
                            callback: function(value) {
                                return (value / 1000) + 'k';
                            }
                        }
                    }
                }
            }
        });
    }

    window.onload = () => {
        const saved = localStorage.getItem('assetData_v9');
        if (saved) {
            const data = JSON.parse(saved);
            Object.keys(data).forEach(id => { if(document.getElementById(id)) document.getElementById(id).value = data[id]; });
        }
        fetchRate();
    };
</script>

</body>
</html>
